<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Herramienta para analizar metadatos de imágenes">
    <meta name="theme-color" content="#2c5364">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="MetaFinder - Explora tus imágenes">
    <meta property="og:description" content="Herramienta para analizar metadatos de imágenes">
    <title>MetaFinder - Explora tus imágenes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preload" href="../static/css/styles.css" as="style">
    <link rel="preload" href="../static/js/app.js" as="script">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
    <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>MetaFinder</h1>
            <p>Analiza los metadatos de tus imágenes</p>
        </div>
    </header>
    
    <main>
        <section class="upload-section">
            <div id="dropZone" class="drop-zone" aria-label="Zona de arrastrar y soltar">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="upload-content">
                        <img src="../static/img/upload-icon.svg" alt="Ícono de subida" class="upload-icon">
                        <p>Arrastra y suelta tu imagen aquí o</p>
                        <label for="imageInput" class="custom-file-input">
                            Selecciona un archivo
                            <input type="file" id="imageInput" name="image" accept="image/*" hidden>
                        </label>
                        <p class="file-info">Formatos soportados: JPG, PNG, GIF (máx. 16MB)</p>
                    </div>
                </form>
            </div>

            <div class="preview-container hidden" id="previewContainer">
                <img id="imagePreview" src="#" alt="Vista previa de la imagen">
                <button id="analyzeButton" class="analyze-btn">Analizar Imagen</button>
            </div>

            <div id="loadingIndicator" class="loading-indicator hidden" role="status" aria-live="polite"></div>
        </section>

        <section id="resultSection" class="result-section hidden">
            <h2>Metadatos de la Imagen</h2>
            <div class="metadata-grid">
                <div id="basicInfo" class="metadata-category">
                    <h3>Información Básica</h3>
                    <div class="metadata-content"></div>
                </div>
                <div id="technicalInfo" class="metadata-category">
                    <h3>Información Técnica</h3>
                    <div class="metadata-content"></div>
                </div>
                <div id="gpsInfo" class="metadata-category">
                    <h3>Datos GPS</h3>
                    <div class="metadata-content"></div>
                </div>
                <div id="otherInfo" class="metadata-category">
                    <h3>Otros Detalles</h3>
                    <div class="metadata-content"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>MetaFinder © 2025</p>
    </footer>
    
    <script src="../static/js/app.js"></script>
</body>
</html>
